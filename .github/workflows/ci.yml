name: Subly CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flake8
      - run: flake8 SUBLY_1.0_ENTERPRISES/ --max-line-length=120 --exclude=SUBLY_1.0_ENTERPRISES/__pycache__,SUBLY_1.0_ENTERPRISES/frontend --extend-ignore=W291,W293

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest flask flask-jwt-extended flask-cors bcrypt mysql-connector-python
      - run: pytest SUBLY_1.0_ENTERPRISES/tests/ -v
