name: Subly CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (comprobar estilo del código)
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar flake8
        run: pip install flake8

      - name: Ejecutar flake8 sobre el backend
      run: flake8 MVP/ --max-line-length=120 --exclude=MVP/__pycache__,MVP/frontend,MVP/tests --extend-ignore=W291,W293
  test:
    name: Tests básicos
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install pytest flask flask-jwt-extended flask-cors python-dotenv bcrypt APScheduler mysql-connector-python

      - name: Ejecutar tests
        run: pytest MVP/tests/ -v
